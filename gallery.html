        <div id="lightbox" class="lightbox">
            <span class="close">&times;</span>
            <img class="lightbox-img" src="" alt="">
            <a class="prev">&#10094;</a>

    <footer>
        <p>&copy; <span id="year"></span> Sree Maruthi Solar</p>
        <script>document.getElementById('year').textContent = new Date().getFullYear();</script>
        <script>
            // lightbox functionality
            document.addEventListener('DOMContentLoaded', () => {
                const lightbox = document.getElementById('lightbox');
                const lightboxImg = lightbox.querySelector('.lightbox-img');
                const closeBtn = lightbox.querySelector('.close');
                const prevBtn = lightbox.querySelector('.prev');
                const nextBtn = lightbox.querySelector('.next');
                const links = Array.from(document.querySelectorAll('.gallery a'));
                let currentIndex = -1;

                function showLightbox(index) {
                    currentIndex = index;
                    lightboxImg.src = links[index].href;
                    lightbox.style.display = 'flex';
                }
                function hideLightbox() {
                    lightbox.style.display = 'none';
                    lightboxImg.src = '';
                    currentIndex = -1;
                }
                function showPrev() {
                    if (currentIndex > 0) {
                        showLightbox(currentIndex - 1);
                    } else {
                        showLightbox(links.length - 1); // wrap to last
                    }
                }
                function showNext() {
                    if (currentIndex < links.length - 1) {
                        showLightbox(currentIndex + 1);
                    } else {
                        showLightbox(0); // wrap to first
                    }
                }

                links.forEach((link, idx) => {
                    link.addEventListener('click', e => {
                        e.preventDefault();
                        showLightbox(idx);
                    });
                });
                closeBtn.addEventListener('click', hideLightbox);
                prevBtn.addEventListener('click', showPrev);
                nextBtn.addEventListener('click', showNext);
                lightbox.addEventListener('click', e => {
                    if (e.target === lightbox) hideLightbox();
                });
                document.addEventListener('keydown', e => {
                    if (lightbox.style.display === 'flex') {
                        if (e.key === 'ArrowLeft') showPrev();
                        if (e.key === 'ArrowRight') showNext();
                        if (e.key === 'Escape') hideLightbox();
                    }
                });
            });
        </script>
    </footer>
